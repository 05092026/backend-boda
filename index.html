<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lara & Moisés | 05.09.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f7f2; /* Tono crema rústico */
            color: #5d5b57;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #4a6741; /* Verde Eucalipto */
            margin-bottom: 0.5rem;
        }

        .date {
            font-size: 0.9rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #8c735b;
        }

        p { margin-bottom: 2rem; line-height: 1.6; }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 16px;
            font-size: 15px;
            background-color: transparent;
            border: 1px solid #4a6741;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            color: #4a6741;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        button:hover {
            background-color: #4a6741;
            color: white;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: #e5e0d8;
            border-radius: 3px;
            margin-top: 30px;
            display: none;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #4a6741;
            transition: width 0.6s ease;
        }

        #message { margin-top: 20px; font-weight: 400; font-style: italic; color: #4a6741; }
        
        input { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Lara & Moisés</h1>
        <div class="date">05.09.2026</div>
        
        <p>Gracias por acompañarnos en este día tan especial. Nos encantaría ver nuestra boda a través de vuestros ojos.</p>

        <div class="buttons-container">
            <button onclick="document.getElementById('cameraPhoto').click()">📸 Hacer una foto</button>
            <button onclick="document.getElementById('cameraVideo').click()">🎥 Hacer un vídeo</button>
            <button onclick="document.getElementById('gallery').click()">🖼 Subir de la galería</button>
        </div>

        <input type="file" id="cameraPhoto" accept="image/*" capture="environment" onchange="subir(this.files[0])">
        <input type="file" id="cameraVideo" accept="video/*" capture="camcorder" onchange="subir(this.files[0])">
        <input type="file" id="gallery" accept="image/*,video/*" onchange="subir(this.files[0])">

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="message"></div>
    </div>

    <script>
        async function subir(file) {
            if (!file) return;

            const message = document.getElementById('message');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            message.innerText = "Preparando el envío...";
            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';

            try {
                // 1. Pedir la etiqueta de envío al portero (Render)
                const responsePermiso = await fetch('https://backend-boda-qgt1.onrender.com/get-upload-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: file.name,
                        mimeType: file.type
                    })
                });

                if (!responsePermiso.ok) throw new Error("Error pidiendo permiso");
                const data = await responsePermiso.json();
                const uploadUrl = data.uploadUrl;

                progressBar.style.width = '40%';
                message.innerText = "Subiendo archivo...";

                // 2. Enviar el archivo pesadísimo directamente a Google Drive
                const responseSubida = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': file.type },
                    body: file
                });

                if (responseSubida.ok) {
                    progressBar.style.width = '100%';
                    message.innerText = "¡Gracias por formar parte de nuestra historia!";
                } else {
                    throw new Error("Error en la subida directa");
                }
            } catch (err) {
                console.error(err);
                message.innerText = "Algo falló, inténtalo de nuevo por favor.";
                progressContainer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
